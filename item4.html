<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPELLIE</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <header>
    <h1>
      <a href="index.html" class="logo">
        <img src="img/logo.svg" alt="SPELLIE">
      </a>
    </h1>
    <nav>
      <ul>
        <li><a href="payment.html">Payment</a></li>
        <li><a href="attention.html">Attention</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="cart.html"><img src="img/cart.svg"></a></li>
      </ul>
    </nav>
</header>

<main class="product">
  <div class="product-inner">

    <div class="product-image">
      <img src="img/cartitem-4.jpg" alt="商品画像">
    </div>

    <div class="product-info">
      <h1 class="product-name">
        ホワイト生地ぬい服 10cm<br>
        <span>-耳元に薔薇-</span>
      </h1>

      <p class="product-price">¥2900</p>

<div class="product-form">
  <label for="quantity">数量</label>
  <select id="quantity" class="quantity">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
  </select>

  <button class="add-cart">カートに入れる</button>
</div>

    <div class="product-desc">
      <p>【商品仕様】</p>
      <ul>
        <li>・耳裏にチェーンを付けられるフープ付き</li>
        <li>・裏地なし</li>
      </ul>
    </div>

  </div>
</main>


  <footer>
    <a href="index.html" class="logo">
      <img src="img/logo-white.svg" alt="Spellieのロゴ">
    </a>
    <nav>
      <ul>
        <li>
          <a href="index.html#about">About us</a>
        </li>
        <li>
          <a href="index.html#item">Item</a>
        </li>
        <li><a href="index.html#news">News</a></li>
      </ul>
    </nav>
    <p class="copyright">&copy;2025 SPELLIE</p>
  </footer>
</main>

<script>
const btn = document.querySelector('.add-cart');

btn.addEventListener('click', () => {
  const item = {
    name: document.querySelector('.product-name').innerText,
    price: 2900,
    quantity: Number(document.querySelector('.quantity').value),
    image: document.querySelector('.product-image img').src
  };

  let cart = JSON.parse(localStorage.getItem('cart')) || [];
  cart.push(item);
  localStorage.setItem('cart', JSON.stringify(cart));

  alert('カートに追加しました');
});
</script>

</body>
</html>
